name: Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths-ignore: ['**.md', 'LICENSE']
  workflow_dispatch:

env:
  SOLUTION_FILE: Fortnite-in-PNG.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild "${{ env.SOLUTION_FILE }}" /m /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=${{ env.BUILD_PLATFORM }}

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item "bin/Release/image.png.exe" artifact/image.png.exe

      - name: Resolve release info
        id: info
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            "tag=${{ github.ref_name }}"        | Out-File $env:GITHUB_OUTPUT -Append
            "name=Fortnite-in-PNG ${{ github.ref_name }}" | Out-File $env:GITHUB_OUTPUT -Append
            "prerelease=false"                  | Out-File $env:GITHUB_OUTPUT -Append
          } else {
            "tag=latest"                        | Out-File $env:GITHUB_OUTPUT -Append
            "name=Latest build (${{ github.sha }})" | Out-File $env:GITHUB_OUTPUT -Append
            "prerelease=true"                   | Out-File $env:GITHUB_OUTPUT -Append
          }

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: ${{ steps.info.outputs.name }}
          prerelease: ${{ steps.info.outputs.prerelease }}
          generate_release_notes: true
          files: artifact/image.png.exe
